<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Lobby</title>
  <link rel="stylesheet" href="lobby.css" />

  <script type="module" src="lobby.js" defer></script>
</head>
<body>
  <div class="container auth-shell">
    <div class="top-row">
      <h1>Game Lobby</h1>
      <button id="logout-button" type="button">Log out</button>
    </div>

    <div id="user-card" class="panel"></div>

    <div class="panel">
      <h2>Create a game</h2>
      <label for="game-title">Game name</label>
      <input type="text" id="game-title" placeholder="Tuesday campaign" />

      <label for="game-mode">System</label>
      <select id="game-mode">
        <option value="openlegend">Open Legend</option>
        <option value="dnd">D&amp;D</option>
        <option value="pathfinder2e">Pathfinder 2E</option>
        <option value="coc7e">Call of Cthulhu 7E</option>
        <option value="savageworlds">Savage Worlds Adventure Edition</option>
        <option value="vampire5e">Vampire: The Masquerade 5E</option>
        <option value="cyberpunkred">Cyberpunk RED</option>
        <option value="lancer">Lancer</option>
        <option value="shadowdark">Shadowdark RPG</option>
        <option value="wfrp4e">Warhammer Fantasy Roleplay 4E</option>
        <option value="starfinder">Starfinder</option>
      </select>

      <button id="create-game-button" type="button">Create game</button>
    </div>

    <div class="panel">
      <h2>Join a game</h2>
      <label for="join-code">4-letter code</label>
      <input type="text" id="join-code" maxlength="4" placeholder="ABCD" />
      <button id="join-game-button" type="button">Join game</button>
    </div>

    <div class="panel">
      <h2>Your games</h2>
      <div id="games-list" class="list-stack"></div>
    </div>

    <p id="lobby-status" class="muted"></p>
  </div>
</body>
</html>
