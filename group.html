<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64x64.png" />
  <title>Initiative</title>

  <script type="module" src="server.js?v=20260406e" defer></script>
  <script type="module" src="health.js?v=20260406e" defer></script>
  <script type="module" src="tracker_theme.js" defer></script>
  <script src="turn.js" defer></script>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="turn.css" />
  <link rel="stylesheet" href="save.css" />
  <link rel="stylesheet" id="group-theme-style" href="" />
  <link rel="stylesheet" id="group-turn-theme-style" href="" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet" />
</head>
<style>
  #game-code-badge {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.75);
    color: #e3cf95;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
    border: 1px solid #2d3d73;
  }
</style>

<body>
  <div class="container">
    <h1>Initiative</h1>
      <div id="game-code-badge">Code: ----</div>
        <br>
        <a href="lobby.html" class="button-link">Lobby</a>
        <br>

    <div class="ranking-container">
      <div class="global-stat-selector">
        <label><input type="radio" name="globalStat" value="grd" checked> GRD</label>
        <label><input type="radio" name="globalStat" value="res"> RES</label>
        <label><input type="radio" name="globalStat" value="tgh"> TGH</label>
      </div>

      <div id="round-counter">Round: <span id="round-value">1</span></div>

      <div class="ranking-header">
        <div class="column name">Name</div>
        <div class="column hp">HP</div>
        <div class="column dmg">DMG</div>
      </div>

      <ul id="rankingList" class="ranking-body"></ul>

      <div class="button-container">
        <button id="apply-damage-button">Apply Damage</button>
        <button id="next-button">Next</button>
      </div>
    </div>

    <br />
    <button id="clear-list-button">Clear List</button>
    <button id="reset-round-button">Reset Round</button>
    <br /><br />

    <h2>Submit a New Entry</h2>

    <label for="name">Name:</label>
    <input type="text" id="name" required />

    <label for="initiative">Initiative:</label>
    <input type="number" id="initiative" required />

    <label for="health">Health:</label>
    <input type="number" id="health" />

    <div class="defense-input-row">
      <div class="defense-input">
        <label for="grd">GRD:</label>
        <input type="number" id="grd" />
      </div>
      <div class="defense-input">
        <label for="res">RES:</label>
        <input type="number" id="res" />
      </div>
      <div class="defense-input">
        <label for="tgh">TGH:</label>
        <input type="number" id="tgh" />
      </div>
    </div>

    <button id="submit-button">Submit</button>

    <br /><br />
    <a id="save-link" href="save.html" class="button-link">Go to Lists</a>
    <a id="monster-link" href="openmonsterlist.html" class="button-link">Go to Monster List</a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      if (!code) return;

      const saveLink = document.getElementById("save-link");
      const monsterLink = document.getElementById("monster-link");

      if (saveLink) {
        saveLink.href = `save.html?code=${encodeURIComponent(code)}`;
      }

      if (monsterLink) {
        monsterLink.href = `openmonsterlist.html?code=${encodeURIComponent(code)}`;
      }
    })();
  </script>

  <!-- Stats Modal -->
  <div id="stat-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="stat-modal-title">
      <button class="ol-modal__close" id="stat-modal-close" aria-label="Close">×</button>
      <h3 id="stat-modal-title"></h3>

      <p class="ol-meta">
        <span class="label">Initiative:</span>
        <span class="value" id="stat-init"></span>
      </p>

      <div class="ol-modal__stats">
        <div><span class="label">GRD:</span><span class="value" id="stat-grd"></span></div>
        <div><span class="label">RES:</span><span class="value" id="stat-res"></span></div>
        <div><span class="label">TGH:</span><span class="value" id="stat-tgh"></span></div>
      </div>

      <a id="stat-url" class="button-link" target="_blank" rel="noopener" style="display:none; margin-top:12px;">Open details</a>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input id="stat-heal-amount" type="number" placeholder="Heal amount" style="flex:1; padding:6px 8px;">
        <button id="stat-heal" class="button">Heal</button>
      </div>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input id="stat-countdown-amount" type="number" min="1" placeholder="Countdown (turns)" style="flex:1; padding:6px 8px;">
        <button id="stat-countdown-set" class="button">Start</button>
        <button id="stat-countdown-clear" class="button">Clear</button>
      </div>

      <p class="ol-meta" style="margin-top:10px;">
        <span class="label">Countdown remaining:</span>
        <span class="value" id="stat-countdown-remaining">—</span>
      </p>

      <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
        <button id="stat-add-bane" type="button">Bane</button>
        <button id="stat-delete" class="remove-button" style="margin-top:0;">Delete from list</button>
      </div>
    </div>
  </div>

  <div id="hp-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="hp-modal-title">
      <button class="ol-modal__close" id="hp-modal-close" aria-label="Close">×</button>
      <h3 id="hp-modal-title">Set HP</h3>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input id="hp-set-amount" type="number" placeholder="Set HP" style="flex:1; padding:6px 8px;">
        <button id="hp-set-button" class="remove-button">Set</button>
      </div>
    </div>
  </div>

  <div id="bane-picker-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog ol-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="bane-picker-title">
      <button class="ol-modal__close" id="bane-picker-close" aria-label="Close">×</button>
      <h3 id="bane-picker-title">Banes</h3>
      <div id="bane-picker-list" class="bane-picker-list"></div>
    </div>
  </div>

  <div id="banes-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog ol-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="banes-modal-title">
      <button class="ol-modal__close" id="banes-modal-close" aria-label="Close">×</button>
      <h3 id="banes-modal-title">Banes</h3>
      <div id="banes-modal-list" class="banes-modal-list"></div>
    </div>
  </div>
  <script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const code = (params.get("code") || "").trim().toUpperCase();
    const badge = document.getElementById("game-code-badge");

    if (!badge) return;

    badge.textContent = code ? `Code: ${code}` : `No code in URL`;
    console.log("Full URL:", window.location.href);
    console.log("Code from URL:", code);
  })();
</script>

</body>
</html>
