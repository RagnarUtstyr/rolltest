<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleset Builder</title>
  <link rel="stylesheet" href="ruleset_builder.css" />
  <link rel="stylesheet" id="builder-theme-style" href="ruleset_builder_openlegend.css" />
  <script type="module" src="ruleset_builder.js" defer></script>
</head>
<body>
  <main class="builder-shell">
    <div class="top-row">
      <div>
        <h1 id="builder-title">Ruleset Builder</h1>
        <div id="builder-meta" class="muted">Loading game…</div>
      </div>
      <a id="back-to-player-link" class="button-link" href="player.html">Back to player</a>
    </div>

    <section class="builder-panel">
      <div class="builder-link-row">
        <div>
          <h2 id="builder-subtitle">Guided character builder</h2>
          <p id="builder-copy" class="muted">A stronger builder with enough structure to capture the system’s table-facing stats.</p>
        </div>
        <button id="save-now-btn" type="button">Save Now</button>
      </div>
      <div id="save-status" class="muted"></div>
    </section>

    <div id="builder-summary" class="summary-grid"></div>
    <div id="builder-sections" class="section-stack"></div>
  </main>
</body>
</html>
