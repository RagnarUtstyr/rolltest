<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Initiative</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script type="module" src="server_dnd.js?v=20260406i" defer></script>
  <script type="module" src="health_dnd.js?v=20260406i" defer></script>
  <script type="module" src="popup_dnd.js?v=20260406i" defer></script>
  <script src="turn_dnd.js" defer></script>

  <link rel="stylesheet" href="style_dnd.css" />
  <link rel="stylesheet" href="turn_dnd.css" />
  <link rel="stylesheet" href="save.css" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet" />

<style>
  #game-code-badge {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.75);
    color: #e3cf95;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
    border: 1px solid #2d3d73;
  }

  .ol-modal[aria-hidden="true"] {
    display: none;
  }

  .ol-modal[aria-hidden="false"] {
    display: flex;
  }

  .ol-modal {
    position: fixed;
    inset: 0;
    z-index: 10000;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.65);
    padding: 16px;
  }

  .ol-modal__dialog {
    width: min(92vw, 440px);
    background: #1c1c1c;
    color: #f3e7c1;
    border: 1px solid #8b6f2b;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    position: relative;
  }

  .ol-modal__dialog--wide {
    width: min(92vw, 560px);
  }

  .ol-modal__close {
    position: absolute;
    top: 8px;
    right: 10px;
    border: 0;
    background: transparent;
    color: #f3e7c1;
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }

  .ol-modal__stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    margin-bottom: 12px;
  }

  .ol-meta {
    margin: 8px 0;
  }

  .ol-modal .label {
    font-weight: 700;
    margin-right: 6px;
  }

  .ol-modal .value {
    font-weight: 400;
  }

  .ol-modal input[type="number"] {
    min-width: 0;
  }

  .effect-picker-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .effect-picker-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .effect-icon {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    object-fit: cover;
    display: block;
  }

  #effect-picker-list,
  #effects-modal-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 12px;
  }

  .list-item {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    align-items: center;
    gap: 10px 16px;
  }

  .name-ac-container {
    display: contents;
  }

  .name-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-width: 0;
  }

  .name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ac,
  .health {
    white-space: nowrap;
    text-align: center;
    justify-self: center;
    margin-top: 0;
  }

  .damage-input {
    width: 100%;
    max-width: 110px;
    justify-self: center;
    align-self: center;
    margin-top: 0;
  }

  .remove-button {
    justify-self: center;
    align-self: center;
  }

  .row-effects {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    min-height: 24px;
    flex-wrap: wrap;
  }

  .effects-summary-icons {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }

  .effect-row-icon {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    vertical-align: middle;
    object-fit: cover;
    display: block;
  }

  .effects-button {
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #8b6b2f;
    background: rgba(40, 24, 8, 0.9);
    color: #f7e7b2;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    white-space: nowrap;
  }

  .effects-button:hover {
    filter: brightness(1.08);
  }
</style>
</head>

<body>
  <div class="container">
    <h1>Initiative</h1>
    <div id="game-code-badge">Code: ----</div>

    <br />
    <a href="lobby.html" class="button-link">Lobby</a>
    <br />

    <ul id="rankingList"></ul>

    <div class="button-container">
      <button id="apply-damage-button">Apply Damage</button>
      <button id="next-button">Next</button>
    </div>

    <br />
    <button id="clear-list-button">Clear List</button>

    <br /><br />
    <br /><br />

    <h2>Submit a New Entry</h2>

    <label for="name">Name:</label>
    <input type="text" id="name" required />

    <label for="initiative">Initiative:</label>
    <input type="number" id="initiative" required />

    <label for="health">Health:</label>
    <input type="number" id="health" />

    <label for="ac">AC:</label>
    <input type="number" id="ac" />

    <button id="submit-button">Submit</button>

    <br /><br />

    <a id="save-link" href="save.html" class="button-link">Go to Lists</a>
    <a id="monster-link" href="monster.html" class="button-link">Go to Monster List</a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      if (!code) return;

      const saveLink = document.getElementById("save-link");
      const monsterLink = document.getElementById("monster-link");

      if (saveLink) saveLink.href = `save.html?code=${encodeURIComponent(code)}`;
      if (monsterLink) monsterLink.href = `monster.html?code=${encodeURIComponent(code)}`;
    })();
  </script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      const badge = document.getElementById("game-code-badge");
      if (!badge) return;

      badge.textContent = code ? `Code: ${code}` : "No code in URL";
      console.log("Full URL:", window.location.href);
      console.log("Code from URL:", code);
    })();
  </script>

  <!-- Stat Modal -->
  <div id="stat-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="stat-modal-title">
      <button class="ol-modal__close" id="stat-modal-close" aria-label="Close">×</button>

      <h3 id="stat-modal-title"></h3>

      <p class="ol-meta">
        <span class="label">Initiative:</span>
        <span class="value" id="stat-init"></span>
      </p>

      <div class="ol-modal__stats">
        <div>
          <span class="label">AC:</span>
          <span class="value" id="stat-ac"></span>
        </div>
        <div>
          <span class="label">HP:</span>
          <span class="value" id="stat-hp"></span>
        </div>
      </div>

      <a
        id="stat-url"
        class="button-link"
        target="_blank"
        rel="noopener"
        style="display:none; margin-top:12px;"
      >
        Open details
      </a>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input
          id="stat-heal-amount"
          type="number"
          placeholder="Heal amount"
          style="flex:1; padding:6px 8px;"
        />
        <button id="stat-heal" class="remove-button">Heal</button>
      </div>

      <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
        <button id="stat-add-effect" type="button">Effect</button>
        <button id="stat-delete" class="remove-button" style="margin-top:0;">Delete from list</button>
      </div>
    </div>
  </div>

  <!-- HP Modal -->
  <div id="hp-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="hp-modal-title">
      <button class="ol-modal__close" id="hp-modal-close" aria-label="Close">×</button>
      <h3 id="hp-modal-title">Set HP</h3>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input
          id="hp-set-amount"
          type="number"
          placeholder="Set HP"
          style="flex:1; padding:6px 8px;"
        />
        <button id="hp-set-button" class="remove-button">Set</button>
      </div>
    </div>
  </div>

  <!-- Effect Picker Modal -->
  <div id="effect-picker-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog ol-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="effect-picker-title">
      <button class="ol-modal__close" id="effect-picker-close" aria-label="Close">×</button>
      <h3 id="effect-picker-title">Add effect</h3>
      <div id="effect-picker-list"></div>
    </div>
  </div>

  <!-- Effects Modal -->
  <div id="effects-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog ol-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="effects-modal-title">
      <button class="ol-modal__close" id="effects-modal-close" aria-label="Close">×</button>
      <h3 id="effects-modal-title">Effects</h3>
      <div id="effects-modal-list"></div>
    </div>
  </div>
</body>
</html>
