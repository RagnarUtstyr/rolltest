<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Initiative</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script type="module" src="server_dnd.js?v=20260406g" defer></script>
  <script type="module" src="health_dnd.js?v=20260406g" defer></script>
  <script type="module" src="popup_dnd.js?v=20260406g" defer></script>
  <script src="turn_dnd.js" defer></script>

  <link rel="stylesheet" href="style_dnd.css">
  <link rel="stylesheet" href="turn_dnd.css">
  <link rel="stylesheet" href="save_dnd.css">
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet" />

  <style>
    #game-code-badge {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.75);
      color: #e3cf95;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      border: 1px solid #2d3d73;
    }

    .name-button,
    .health-button {
      background: none;
      border: 0;
      padding: 0;
      margin: 0;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .health-button {
      display: block;
      width: 100%;
    }

    .ol-modal[aria-hidden="true"] {
      display: none;
    }

    .ol-modal[aria-hidden="false"] {
      display: flex;
    }

    .ol-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      padding: 16px;
    }

    .ol-modal__dialog {
      width: min(92vw, 440px);
      background: #1c1c1c;
      color: #f3e7c1;
      border: 1px solid #8b6f2b;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      position: relative;
    }

    .ol-modal__close {
      position: absolute;
      top: 8px;
      right: 10px;
      border: 0;
      background: transparent;
      color: #f3e7c1;
      font-size: 24px;
      cursor: pointer;
    }

    .ol-modal__stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    .ol-meta {
      margin: 8px 0;
    }

    .ol-modal .label {
      font-weight: 700;
      margin-right: 6px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Initiative</h1>
    <div id="game-code-badge">Code: ----</div>

    <br />
    <a href="lobby.html" class="button-link">Lobby</a>
    <br />

    <ul id="rankingList"></ul>

    <div class="button-container">
      <button id="apply-damage-button">Apply Damage</button>
      <button id="next-button">Next</button>
    </div>

    <br />
    <button id="clear-list-button">Clear List</button>

    <br /><br />
    <br /><br />

    <h2>Submit a New Entry</h2>

    <label for="name">Name:</label>
    <input type="text" id="name" required />

    <label for="initiative">Initiative:</label>
    <input type="number" id="initiative" required />

    <label for="health">Health:</label>
    <input type="number" id="health" />

    <label for="ac">AC:</label>
    <input type="number" id="ac" />

    <button id="submit-button">Submit</button>

    <br /><br />

    <a id="save-link" href="save.html" class="button-link">Go to Lists</a>
    <a id="monster-link" href="monster.html" class="button-link">Go to Monster List</a>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      if (!code) return;

      const saveLink = document.getElementById("save-link");
      const monsterLink = document.getElementById("monster-link");

      if (saveLink) saveLink.href = `save.html?code=${encodeURIComponent(code)}`;
      if (monsterLink) monsterLink.href = `monster.html?code=${encodeURIComponent(code)}`;
    })();
  </script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      const badge = document.getElementById("game-code-badge");
      if (!badge) return;

      badge.textContent = code ? `Code: ${code}` : "No code in URL";
      console.log("Full URL:", window.location.href);
      console.log("Code from URL:", code);
    })();
  </script>

  <div id="stat-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="stat-modal-title">
      <button class="ol-modal__close" id="stat-modal-close" aria-label="Close">×</button>

      <h3 id="stat-modal-title"></h3>

      <p class="ol-meta">
        <span class="label">Initiative:</span>
        <span id="stat-init"></span>
      </p>

      <div class="ol-modal__stats">
        <div>
          <span class="label">AC:</span>
          <span id="stat-ac"></span>
        </div>
        <div>
          <span class="label">HP:</span>
          <span id="stat-hp"></span>
        </div>
      </div>

      <a id="stat-url" class="button-link" target="_blank" rel="noopener" style="display:none; margin-top:12px;">
        Open details
      </a>
    </div>
  </div>

  <div id="hp-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="hp-modal-title">
      <button class="ol-modal__close" id="hp-modal-close" aria-label="Close">×</button>
      <h3 id="hp-modal-title">Set HP</h3>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input id="hp-set-amount" type="number" placeholder="Set HP" style="flex:1; padding:6px 8px;" />
      </div>
    </div>
  </div>

  <div id="effect-picker-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="effect-picker-title">
      <button class="ol-modal__close" id="effect-picker-close" aria-label="Close">×</button>
      <h3 id="effect-picker-title">Effects</h3>
      <div id="effect-picker-list"></div>
    </div>
  </div>

  <div id="effects-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="effects-modal-title">
      <button class="ol-modal__close" id="effects-modal-close" aria-label="Close">×</button>
      <h3 id="effects-modal-title">Effects</h3>
      <div id="effects-modal-list"></div>
    </div>
  </div>
</body>
</html>
