<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64x64.png" />

  <title>Initiative</title>

  <script type="module" src="server_dnd.js?v=20260406k" defer></script>
  <script type="module" src="health_dnd.js?v=20260406k" defer></script>

  <link rel="stylesheet" href="style_dnd.css?v=20260406k" />
  <link rel="stylesheet" href="turn_dnd.css" />
  <link rel="stylesheet" href="save_dnd.css" />
  <script src="turn_dnd.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet" />
</head>

<style>
  #game-code-badge {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.75);
    color: #e3cf95;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
    border: 1px solid #2d3d73;
  }
</style>

<body>
  <div class="container">
    <h1>Initiative</h1>
    <div id="game-code-badge">Code: ----</div>

    <br />

    <a href="lobby.html" class="button-link">Lobby</a>

    <br />

    <ul id="rankingList"></ul>

    <div class="button-container">
      <button id="apply-damage-button">Apply Damage</button>
      <button id="next-button">Next</button>
    </div>

    <br />

    <button id="clear-list-button">Clear List</button>

    <br /><br />
    <br /><br />

    <h2>Submit a New Entry</h2>

    <label for="name">Name:</label>
    <input type="text" id="name" required />

    <label for="initiative">Initiative:</label>
    <input type="number" id="initiative" required />

    <label for="health">Health:</label>
    <input type="number" id="health" />

    <label for="ac">AC:</label>
    <input type="number" id="ac" />

    <button id="submit-button">Submit</button>

    <br /><br />

    <a id="save-link" href="save.html" class="button-link">Go to Lists</a>
    <a id="monster-link" href="monster.html" class="button-link">Go to Monster List</a>
  </div>

  <!-- Stats Modal -->
  <div id="stat-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="stat-modal-title">
      <button class="ol-modal__close" id="stat-modal-close" aria-label="Close">×</button>

      <h3 id="stat-modal-title"></h3>

      <p class="ol-meta">
        <span class="label">Initiative:</span>
        <span class="value" id="stat-init"></span>
      </p>

      <a
        id="stat-url"
        class="button-link"
        target="_blank"
        rel="noopener"
        style="display:none; margin-top:12px;"
      >
        To Monster
      </a>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input
          id="stat-heal-amount"
          type="number"
          placeholder="Heal amount"
          style="flex:1; padding:6px 8px;"
        />
        <button id="stat-heal" class="remove-button" type="button">Heal</button>
      </div>

      <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
        <input
          id="stat-countdown-amount"
          type="number"
          min="1"
          placeholder="Countdown (turns)"
          style="flex:1; padding:6px 8px;"
        />
        <button id="stat-countdown-set" class="remove-button" type="button">Start</button>
        <button id="stat-countdown-clear" class="remove-button" type="button">Clear</button>
      </div>

      <p class="ol-meta" style="margin-top:10px;">
        <span class="label">Countdown remaining:</span>
        <span class="value" id="stat-countdown-remaining">—</span>
      </p>

      <div style="display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;">
        <button id="stat-add-effect" type="button">Effect</button>
        <button id="stat-delete" class="remove-button" type="button" style="margin-top:0;">
          Delete from list
        </button>
      </div>
    </div>
  </div>

  <div id="effect-picker-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog ol-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="effect-picker-title">
      <button class="ol-modal__close" id="effect-picker-close" aria-label="Close">×</button>
      <h3 id="effect-picker-title">Add effect</h3>
      <div id="effect-picker-list" class="bane-picker-list"></div>
    </div>
  </div>

  <div id="effects-modal" class="ol-modal" aria-hidden="true">
    <div class="ol-modal__dialog ol-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="effects-modal-title">
      <button class="ol-modal__close" id="effects-modal-close" aria-label="Close">×</button>
      <h3 id="effects-modal-title">Manage effects</h3>
      <div id="effects-modal-list" class="banes-modal-list"></div>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      if (!code) return;

      const saveLink = document.getElementById("save-link");
      const monsterLink = document.getElementById("monster-link");

      if (saveLink) {
        saveLink.href = `save.html?code=${encodeURIComponent(code)}`;
      }

      if (monsterLink) {
        monsterLink.href = `monster.html?code=${encodeURIComponent(code)}`;
      }
    })();
  </script>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      const badge = document.getElementById("game-code-badge");

      if (!badge) return;
      badge.textContent = code ? `Code: ${code}` : `No code in URL`;
    })();
  </script>
</body>
</html>
