   function createMonsterCard(monster) {
      const entry = document.createElement("div");
      entry.className = "table-entry";

      entry.innerHTML = `
        <div><span class="label">Name</span><span class="content">${monster.name}</span></div>
        <div><span class="label">HP</span><span class="content">${monster.health}</span></div>
        <div><span class="label">GRD</span><span class="content">${monster.grd}</span></div>
        <div><span class="label">RES</span><span class="content">${monster.res}</span></div>
        <div><span class="label">TGH</span><span class="content">${monster.tgh}</span></div>
        ${
          monster.url
            ? `<div><span class="label">Link</span><span class="content"><a href="${monster.url}" target="_blank" rel="noopener">Open</a></span></div>`
            : ""
        }
      `;

      const buttonWrap = document.createElement("div");
      buttonWrap.className = "link-button";

      const addButton = document.createElement("button");
      addButton.className = "add-to-list-button";
      addButton.textContent = "Add to Initiative";

addButton.addEventListener("click", async () => {
  if (!code) {
    alert("Missing game code in URL.");
    return;
  }

  const initiativeInput = window.prompt(
    `Enter initiative for ${monster.name}:`,
    "0"
  );

  if (initiativeInput === null) {
    return; // user pressed cancel
  }

  const initiative = parseInt(initiativeInput, 10);

  if (Number.isNaN(initiative)) {
    alert("Initiative must be a number.");
    return;
  }

  try {
    await push(ref(db, `games/${code}/entries`), {
      name: monster.name,
      health: monster.health,
      grd: monster.grd,
      res: monster.res,
      tgh: monster.tgh,
      number: initiative,
      initiative,
      url: monster.url || ""
    });

    alert(`${monster.name} added to initiative.`);
  } catch (error) {
    console.error("Failed to add monster:", error);
    alert("Could not add monster.");
  }
});

      buttonWrap.appendChild(addButton);
      entry.appendChild(buttonWrap);

      return entry;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("monster-list");
      const searchInput = document.getElementById("search");
      const backLink = document.getElementById("back-link");

      if (backLink && code) {
        backLink.href = `group.html?code=${encodeURIComponent(code)}`;
      }

      function renderMonsters(filterText = "") {
        const q = filterText.trim().toLowerCase();
        container.innerHTML = "";

        const filtered = monsters.filter((monster) =>
          monster.name.toLowerCase().includes(q)
        );

        if (!filtered.length) {
          const empty = document.createElement("div");
          empty.className = "table-entry";
          empty.innerHTML = `
            <div>
              <span class="label">Result</span>
              <span class="content">No monsters found.</span>
            </div>
          `;
          container.appendChild(empty);
          return;
        }

        filtered.forEach((monster) => {
          container.appendChild(createMonsterCard(monster));
        });
      }

      searchInput.addEventListener("input", (event) => {
        renderMonsters(event.target.value);
      });

      renderMonsters();
    });
  </script>
